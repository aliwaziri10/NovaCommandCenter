name: Generate Images

on:
  workflow_dispatch:
    inputs:
      video_id:
        description: "Video ID to generate images for (leave blank to auto-select)"
        required: false
        type: string
  schedule:
    - cron: "15 */6 * * *"

jobs:
  generate_images:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install requests==2.32.3

      - name: Run image generation
        env:
          RAILWAY_URL: https://novacommandcenter-production.up.railway.app
          ASSEMBLY_SECRET: ${{ secrets.ASSEMBLY_SECRET }}
          VIDEO_ID: ${{ inputs.video_id }}
        run: python .github/scripts/generate_images.py
