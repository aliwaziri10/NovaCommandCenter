name: Assemble Video

on:
  workflow_dispatch:
    inputs:
      video_id:
        description: "Video ID to assemble (leave blank to auto-select)"
        required: false
        type: string
  schedule:
    - cron: "45 */6 * * *"

permissions:
  contents: read
  issues: write

jobs:
  assemble:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install requests==2.32.3 moviepy==1.0.3 Pillow==10.4.0 imageio-ffmpeg==0.4.9 numpy==1.24.4

      - name: Run assembly
        env:
          RAILWAY_URL: https://novacommandcenter.onrender.com
          ASSEMBLY_SECRET: ${{ secrets.ASSEMBLY_SECRET }}
          ACE_MUSIC_API_KEY: ${{ secrets.ACE_MUSIC_API_KEY }}
          VIDEO_ID: ${{ inputs.video_id }}
        run: python .github/scripts/assemble.py

      - name: Open issue on failure
        if: failure()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh issue create \
            --repo "${{ github.repository }}" \
            --title "Assemble workflow failed - run #${{ github.run_number }}" \
            --body "The assemble workflow failed on $(date -u +%Y-%m-%dT%H:%M:%SZ).

          Run log: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}

          Open the run log above and check the top of the failed step's output for the FAILURE SUMMARY block (script, line, error type/message) before digging into the full traceback."
