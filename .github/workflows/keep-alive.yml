name: Keep Backend Awake

on:
  schedule:
    - cron: '*/10 * * * *'  # every 10 minutes, 24/7
  workflow_dispatch:  # allows manual trigger from the Actions tab

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Nova backend
        run: |
          curl -sS -o /dev/null -w "Status: %{http_code}\n" \
            --max-time 100 \
            https://novacommandcenter.onrender.com/api/v1/videos || true
