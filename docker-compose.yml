services:
  backend:
    build: ./backend
    environment:
      DATABASE_URL: ${DATABASE_URL:-sqlite:///./data/nova.db}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:3000,http://localhost:5173}
    volumes:
      - sqlite_data:/app/data
    ports:
      - "8000:8000"

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_URL: /api/v1
    ports:
      - "3000:80"
    depends_on:
      - backend

volumes:
  sqlite_data:
